<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMI Payment Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #2c5282;
        }

        header h1 {
            font-size: 1.4rem;
            color: #1a365d;
            line-height: 1.4;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .payment-info {
            background: #f7fafc;
            border-left: 4px solid #2c5282;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .payment-info h2 {
            color: #1a365d;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.9rem;
        }

        .info-value {
            color: #1a365d;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: right;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2d3748;
            font-weight: 600;
            font-size: 0.95rem;
        }

        select,
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
            background: white;
        }

        .multiselect {
            position: relative;
            z-index: 5;
        }

        .multiselect-toggle {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            background: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            transition: border-color 0.3s;
            min-height: 48px;
            text-align: left;
        }

        .multiselect-toggle:focus,
        .multiselect.open .multiselect-toggle {
            outline: none;
            border-color: #2c5282;
        }

        .multiselect-placeholder {
            color: #718096;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .multiselect-toggle.has-selection .multiselect-placeholder {
            color: #1a365d;
            font-weight: 600;
        }

        .multiselect-arrow {
            color: #718096;
            font-size: 0.8rem;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .multiselect.open .multiselect-arrow {
            transform: rotate(180deg);
        }

        .multiselect-panel {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #2c5282;
            border-radius: 6px;
            box-shadow: 0 10px 25px rgba(44, 82, 130, 0.2);
            padding: 8px;
            display: none;
            z-index: 10;
            max-height: 240px;
            overflow-y: auto;
        }

        .multiselect.open .multiselect-panel {
            display: block;
        }

        .multiselect.open-up .multiselect-panel {
            top: auto;
            bottom: calc(100% + 4px);
        }

        .fee-option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            padding: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #2d3748;
            cursor: pointer;
            border-radius: 4px;
        }

        .fee-option:hover {
            background: #f7fafc;
        }

        .fee-option input[type="checkbox"] {
            width: auto;
            accent-color: #2c5282;
            cursor: pointer;
        }
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #2c5282;
        }

        .input-wrapper {
            position: relative;
        }

        .currency-symbol {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #718096;
            font-weight: 600;
            font-size: 1rem;
            pointer-events: none;
        }

        input[type="number"] {
            padding-right: 50px;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        .pay-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2c5282 0%, #1a365d 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .pay-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(44, 82, 130, 0.3);
        }

        .pay-button:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #718096;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }

            header h1 {
                font-size: 1.1rem;
            }

            .info-row {
                flex-direction: column;
                gap: 4px;
            }

            .info-value {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DMI ST JOHN THE BAPTIST UNIVERSITY LILONGWE CAMPUS</h1>
        </header>

        <section class="payment-info">
            <h2>Bank Details</h2>
            <div class="info-row">
                <span class="info-label">Bank Name:</span>
                <span class="info-value">National Bank</span>
            </div>
            <div class="info-row">
                <span class="info-label">Account Name:</span>
                <span class="info-value">TRUST OF DMI AND COLLABORATORS</span>
            </div>
            <div class="info-row">
                <span class="info-label">Account Number:</span>
                <span class="info-value">1001060755</span>
            </div>
            <div class="info-row">
                <span class="info-label">Branch:</span>
                <span class="info-value">Capital City</span>
            </div>
        </section>

        <form id="paymentForm">
            <div class="form-group">
                <label>Fee Type <span class="hint">(select one or more)</span></label>
                <div class="multiselect" id="feeType">
                    <div class="multiselect-toggle" id="feeTypeToggle" tabindex="0" role="button" aria-haspopup="listbox" aria-expanded="false">
                        <span class="multiselect-placeholder" id="feeTypePlaceholder">Select Fee Type(s)</span>
                        <span class="multiselect-arrow">&#9662;</span>
                    </div>
                    <div class="multiselect-panel" id="feeTypePanel" role="listbox" aria-multiselectable="true">
                        <label class="fee-option"><input type="checkbox" name="feeType" value="registration"> Registration</label>
                        <label class="fee-option"><input type="checkbox" name="feeType" value="tuition"> Tuition</label>
                        <label class="fee-option"><input type="checkbox" name="feeType" value="sports-club"> Sports and Club</label>
                        <label class="fee-option"><input type="checkbox" name="feeType" value="students-union"> Students Union</label>
                        <label class="fee-option"><input type="checkbox" name="feeType" value="id-card"> ID Card</label>
                        <label class="fee-option"><input type="checkbox" name="feeType" value="teaching-practice"> Teaching Practice</label>
                        <label class="fee-option"><input type="checkbox" name="feeType" value="project"> Project</label>
                        <label class="fee-option"><input type="checkbox" name="feeType" value="supplementary-exams"> Supplementary Exams</label>
                        <label class="fee-option"><input type="checkbox" name="feeType" value="revaluation"> Revaluation</label>
                        <label class="fee-option"><input type="checkbox" name="feeType" value="hostel"> Hostel</label>
                        <label class="fee-option"><input type="checkbox" name="feeType" value="transport"> Transport</label>
                        <label class="fee-option"><input type="checkbox" name="feeType" value="certificate-course"> Certificate Course</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="amount">Payment Amount</label>
                <div class="input-wrapper">
                    <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" min="0" required>
                    <span class="currency-symbol">MK</span>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description / Remarks <span class="hint">(required)</span></label>
                <textarea id="description" name="description" placeholder="Enter your Name, Reg No, Program and Semester..." required></textarea>
            </div>

            <button type="submit" class="pay-button">Pay</button>
        </form>

        <div class="footer">
            <p>Secure Payment Portal</p>
        </div>
    </div>

    <script>
        const feeType = document.getElementById('feeType');
        const feeTypeToggle = document.getElementById('feeTypeToggle');
        const feeTypePanel = document.getElementById('feeTypePanel');
        const feeTypePlaceholder = document.getElementById('feeTypePlaceholder');
        const feeCheckboxes = document.querySelectorAll('input[name="feeType"]');

        function updateFeeLabel() {
            const selected = Array.from(feeCheckboxes).filter(cb => cb.checked);
            const labels = selected.map(cb => cb.nextSibling.textContent.trim());
            if (selected.length === 0) {
                feeTypePlaceholder.textContent = 'Select Fee Type(s)';
                feeTypeToggle.classList.remove('has-selection');
            } else if (selected.length === 1) {
                feeTypePlaceholder.textContent = labels[0];
                feeTypeToggle.classList.add('has-selection');
            } else {
                feeTypePlaceholder.textContent = `${selected.length} fee types selected`;
                feeTypeToggle.classList.add('has-selection');
            }
        }

        function openDropdown() {
            feeType.classList.add('open');
            feeTypeToggle.setAttribute('aria-expanded', 'true');

            const rect = feeTypeToggle.getBoundingClientRect();
            const spaceBelow = window.innerHeight - rect.bottom;
            const spaceAbove = rect.top;
            const panelHeight = Math.min(feeTypePanel.scrollHeight, 240) + 8;

            if (spaceBelow < panelHeight && spaceAbove > spaceBelow) {
                feeType.classList.add('open-up');
                feeTypePanel.style.maxHeight = Math.min(240, spaceAbove - 8) + 'px';
            } else {
                feeType.classList.remove('open-up');
                feeTypePanel.style.maxHeight = Math.min(240, spaceBelow - 8) + 'px';
            }
        }

        function closeDropdown() {
            feeType.classList.remove('open');
            feeTypeToggle.setAttribute('aria-expanded', 'false');
        }

        feeTypeToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            feeType.classList.contains('open') ? closeDropdown() : openDropdown();
        });

        feeTypeToggle.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                feeType.classList.contains('open') ? closeDropdown() : openDropdown();
            }
        });

        feeCheckboxes.forEach(cb => cb.addEventListener('change', updateFeeLabel));

        document.addEventListener('click', function(e) {
            if (!feeType.contains(e.target)) {
                closeDropdown();
            }
        });

        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const checkedBoxes = Array.from(feeCheckboxes).filter(cb => cb.checked);
            const feeTypeTexts = checkedBoxes.map(cb => cb.nextSibling.textContent.trim());
            const amount = document.getElementById('amount').value;
            const description = document.getElementById('description').value.trim();

            if (checkedBoxes.length === 0) {
                alert('Please select at least one fee type.');
                return;
            }

            if (!amount || parseFloat(amount) <= 0) {
                alert('Please enter a valid payment amount.');
                return;
            }

            if (!description) {
                alert('Please enter a description.');
                return;
            }

            const formattedAmount = parseFloat(amount).toLocaleString('en-MW', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const feeTypeList = feeTypeTexts.join(', ');

            const message = `Payment Details:\n\n` +
                          `Fee Type: ${feeTypeList}\n` +
                          `Amount: MK ${formattedAmount}\n` +
                          `Description: ${description || 'N/A'}\n\n` +
                          `Bank: National Bank\n` +
                          `Account: TRUST OF DMI AND COLLABORATORS\n` +
                          `Account No: 1001060755\n` +
                          `Branch: Capital City\n\n` +
                          `Please proceed with your payment.`;

            alert(message);

            // Reset form
            this.reset();
            closeDropdown();
            updateFeeLabel();
        });
    </script>
</body>
</html>
